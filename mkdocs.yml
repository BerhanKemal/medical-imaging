site_name: Mobile Apps for Healthcare
site_description: Course materials for AGH BME students
site_url: https://<username>.github.io/<repo-name>/

docs_dir: docs
site_dir: _site

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search: {}
  - encryptcontent:
      global_password: 'AMM2025agh'
      title_prefix: ''
      remember_password: true
      encryption_info_message: 'Enter the course password to access materials.'

nav:
  - Home: README.md
  - Week 1 — Terminal & Git:
    - Lab Workbook: week-01-terminal-git/lab/README.md
    - Lecture Notes: week-01-terminal-git/lecture/LECTURE_NOTES.md
  - Week 2 — Git Branching & APIs:
    - Lab Workbook: week-02-git-apis-curl/lab/README.md
    - Lecture Notes: week-02-git-apis-curl/lecture/LECTURE_NOTES.md
  - Week 3 — Dart Fundamentals:
    - Lab Workbook: week-03-dart-fundamentals/lab/README.md
    - Lecture Notes: week-03-dart-fundamentals/lecture/LECTURE_NOTES.md
  - Week 4 — Flutter Fundamentals:
    - Lab Workbook: week-04-flutter-fundamentals/lab/README.md
    - Lecture Notes: week-04-flutter-fundamentals/lecture/LECTURE_NOTES.md
  - Week 5 — Layouts & Sprints:
    - Lab Workbook: week-05-layouts-forms-sprints/lab/README.md
    - Lecture Notes: week-05-layouts-forms-sprints/lecture/LECTURE_NOTES.md
  - Week 6 — State Management:
    - Lab Workbook: week-06-state-management/lab/README.md
    - Lecture Notes: week-06-state-management/lecture/LECTURE_NOTES.md
  - Week 7 — Local Data:
    - Lab Workbook: week-07-local-data/lab/README.md
    - Lecture Notes: week-07-local-data/lecture/LECTURE_NOTES.md
  - Week 8 — Networking & API:
    - Lab Workbook: week-08-networking-api/lab/README.md
    - Lecture Notes: week-08-networking-api/lecture/LECTURE_NOTES.md
  - Week 9 — Authentication:
    - Lab Workbook: week-09-authentication/lab/README.md
    - Lecture Notes: week-09-authentication/lecture/LECTURE_NOTES.md
  - Resources:
    - AI Tools Policy: resources/ai-tools-policy.md

exclude_docs: |
  **/INSTRUCTOR_GUIDE.md
  **/*.py
  **/*.dart
  **/*.json
  **/*.yaml
  **/*.yml
  **/*.toml
  **/*.lock
  **/*.sh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
